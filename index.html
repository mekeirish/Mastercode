<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastercode - Premium PWA Factory</title>
    <style>
        :root { 
            --bg: #1a1c20; --card-bg: #23272d; --shadow: #121417; 
            --light: #2e333a; --accent: #4b6cb7; --text: #e0e0e0;
            --danger: #ff5f56; --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); 
            margin: 0; padding: 20px; color: var(--text); display: flex; 
            flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 50px; }
        h1 { text-align: center; font-size: 1.6rem; font-weight: 300; letter-spacing: 4px; color: #fff; margin-bottom: 30px; text-transform: uppercase; }
        .card { background: var(--card-bg); padding: 22px; border-radius: 24px; box-shadow: 10px 10px 20px var(--shadow), -5px -5px 15px var(--light); margin-bottom: 25px; }
        label { display: block; margin: 0 0 10px 5px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .token-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, textarea { 
            width: 100%; border: none; padding: 14px; border-radius: 12px; 
            background: #1e2126; color: #fff; box-shadow: inset 4px 4px 8px var(--shadow), inset -2px -2px 6px var(--light); 
            box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .btn-view { padding: 0 15px; border-radius: 12px; border: none; background: var(--card-bg); color: var(--accent); box-shadow: 4px 4px 8px var(--shadow), -2px -2px 6px var(--light); cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--card-bg); box-shadow: 6px 6px 12px var(--shadow), -4px -4px 10px var(--light); cursor: pointer; font-weight: bold; color: var(--accent); margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .btn:active { transform: scale(0.98); box-shadow: inset 4px 4px 8px var(--shadow); }
        .btn-danger { color: var(--danger); font-size: 0.7rem; margin-top: 15px; background: transparent; border:none; width: 100%; cursor: pointer; opacity: 0.6; }
        #status { margin-top: 25px; font-size: 0.75rem; padding: 18px; border-radius: 15px; display: none; background: #16181c; color: #888; font-family: monospace; border: 1px solid #2e333a; white-space: pre-wrap; line-height: 1.5; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--card-bg); color: var(--success); padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); font-weight: bold; z-index: 1000; transition: top 0.4s; border: 1px solid var(--success); }
        .signature { margin-top: 50px; font-size: 0.7rem; color: #444; letter-spacing: 1.5px; text-align: center; width: 100%; }
        .preview-icon { width: 70px; height: 70px; margin: 15px auto; border-radius: 18px; border: 2px solid var(--light); display: none; object-fit: cover; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

<div id="toast">✅ Action Réussie</div>

<div class="container">
    <h1>Mastercode</h1>

    <div class="card">
        <label>GitHub Access Token</label>
        <div class="token-row">
            <input type="password" id="ghToken" placeholder="ghp_..." oninput="saveKey('ghToken', this.value)">
            <button class="btn-view" onclick="toggleView('ghToken')">VOIR</button>
        </div>
        <button class="btn-danger" onclick="clearAllData()">🗑️ EFFACER LES CLÉS</button>
    </div>

    <div class="card">
        <label>Nom du Projet</label>
        <input type="text" id="appName" placeholder="ex: master-factory">
        
        <label style="margin-top:20px;">Code HTML Source</label>
        <textarea id="htmlInput" rows="8" placeholder="Colle le code ici..."></textarea>
        
        <label style="margin-top:20px;">Icône PWA</label>
        <input type="file" id="iconInput" accept="image/*" onchange="previewIcon(this)">
        <img id="iconPreview" class="preview-icon">
    </div>

    <button class="btn" onclick="generatePWA()" id="mainBtn">
        <div class="spinner" id="loader"></div>
        <span>FORGER L'APPLICATION</span>
    </button>

    <div id="status"></div>
    <button class="btn" onclick="copyReport()" id="copyBtn" style="color: #666; font-size: 0.75rem; display: none; background:none; box-shadow:none;">📋 COPIER LE RAPPORT</button>

    <div class="signature">Made by Laiche Brahim 2026 Paris</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const saveKey = (id, val) => localStorage.setItem(id, val);
    document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';

    function toggleView(id) {
        const el = document.getElementById(id);
        const btn = event.target;
        if (el.type === "password") { el.type = "text"; btn.innerText = "CACHER"; } 
        else { el.type = "password"; btn.innerText = "VOIR"; }
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.color = isError ? "var(--danger)" : "var(--success)";
        t.style.borderColor = isError ? "var(--danger)" : "var(--success)";
        t.style.top = "30px";
        setTimeout(() => { t.style.top = "-100px"; }, 4000);
    }

    function clearAllData() {
        if(confirm("Supprimer les clés ?")) { localStorage.clear(); location.reload(); }
    }

    let base64Icon = "";
    function previewIcon(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 512; canvas.height = 512;
                    ctx.drawImage(img, 0, 0, 512, 512);
                    base64Icon = canvas.toDataURL('image/png').split(',')[1];
                    document.getElementById('iconPreview').src = canvas.toDataURL('image/png');
                    document.getElementById('iconPreview').style.display = 'block';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateStatus(msg, clear = false) {
        const s = document.getElementById('status');
        s.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'flex';
        if (clear) s.innerHTML = msg; else s.innerHTML += `\n> ${msg}`;
    }

    function copyReport() {
        navigator.clipboard.writeText(document.getElementById('status').innerText);
        showToast("Rapport copié !");
    }

    async function generatePWA() {
        const ghToken = document.getElementById('ghToken').value;
        const appName = document.getElementById('appName').value.trim().replace(/\s+/g, '-');
        let htmlInputContent = document.getElementById('htmlInput').value.trim();
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');

        if (!ghToken || !appName || !htmlInputContent || !base64Icon) return showToast("⚠️ Données manquantes", true);

        btn.disabled = true; loader.style.display = 'block';
        updateStatus("--- SEQUENCE MASTERCODE 2.7 ACTIVÉE ---", true);

        try {
            const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${ghToken}` } });
            if (!userRes.ok) throw new Error("Accès GitHub refusé");
            const userData = await userRes.json();
            const owner = userData.login;

            const repoCheck = await fetch(`https://api.github.com/repos/${owner}/${appName}`, { headers: { 'Authorization': `token ${ghToken}` } });
            if (repoCheck.status === 404) {
                updateStatus("Création du dépôt...");
                await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: appName, auto_init: true })
                });
            }

            updateStatus("Injection du moteur PWA...");
            
            // ASTUCE ANTI-CONFLIT : On fragmente les balises HTML pour l'auto-forge
            const tagS = '<' + 'script' + '>';
            const tagE = '<' + '/' + 'script' + '>';
            const headE = '<' + '/' + 'head' + '>';
            const bodyE = '<' + '/' + 'body' + '>';
            
            const swReg = `\n${tagS}if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}${tagE}\n`;
            const pwaTags = `\n<link rel="manifest" href="manifest.json">\n<meta name="theme-color" content="#4b6cb7">\n<link rel="apple-touch-icon" href="icon.png">`;

            let finalHtml = htmlInputContent;
            if (finalHtml.toLowerCase().includes(headE)) {
                finalHtml = finalHtml.replace(new RegExp(headE, 'i'), `${pwaTags}${headE}`);
            } else {
                finalHtml = `<head>${pwaTags}</head>` + finalHtml;
            }
            
            if (finalHtml.toLowerCase().includes(bodyE)) {
                finalHtml = finalHtml.replace(new RegExp(bodyE, 'i'), `${swReg}${bodyE}`);
            } else {
                finalHtml += swReg;
            }

            const manifest = JSON.stringify({
                "name": appName, "short_name": appName, "start_url": "./index.html",
                "display": "standalone", "background_color": "#1a1c20", "theme_color": "#4b6cb7",
                "icons": [{"src": "icon.png", "sizes": "512x512", "type": "image/png"}]
            }, null, 2);

            const sw = `const cacheName='${appName}-v1'; self.addEventListener('install',e=>{e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['./index.html','./manifest.json','./icon.png'])));}); self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;

            const utf8b64 = (s) => btoa(unescape(encodeURIComponent(s)));

            const files = [
                { path: 'index.html', content: utf8b64(finalHtml) },
                { path: 'manifest.json', content: utf8b64(manifest) },
                { path: 'sw.js', content: utf8b64(sw) },
                { path: 'icon.png', content: base64Icon }
            ];

            for (const file of files) {
                updateStatus(`Upload : ${file.path}...`);
                let sha = null;
                const getF = await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, { headers: { 'Authorization': `token ${ghToken}` } });
                if(getF.status === 200) sha = (await getF.json()).sha;

                await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Mastercode Sync', content: file.content, sha: sha })
                });
            }

            updateStatus("Activation GitHub Pages...");
            await new Promise(r => setTimeout(r, 3000));
            await fetch(`https://api.github.com/repos/${owner}/${appName}/pages`, {
                method: 'POST',
                headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ source: { branch: 'main', path: '/' } })
            });

            updateStatus("Opération terminée avec succès.");
            showToast("✅ Mastercode : Forgé !");
        } catch (err) {
            updateStatus("❌ ERREUR : " + err.message);
            showToast("Échec de la forge", true);
        } finally {
            btn.disabled = false; loader.style.display = 'none';
        }
    }
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
